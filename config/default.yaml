# Default experiment configuration
# Based on Choi, Lee & Lim (2025) and Sobel (2020)

population:
  n_agents: 200

  # Lying cost c_l >= 0 (lognormal: heavy right tail, most agents moderate)
  lying_cost:
    dist_type: lognormal
    params:
      mean: -0.5
      sigma: 1.0
    bounds: [0.0, null]

  # Deception cost c_d >= 0
  deception_cost:
    dist_type: lognormal
    params:
      mean: -0.3
      sigma: 1.0
    bounds: [0.0, null]

  # Risk aversion alpha (CRRA): 0=neutral, >0 averse
  risk_aversion:
    dist_type: beta
    params:
      a: 2.0
      b: 5.0
    bounds: [0.0, 2.0]

  # Altruism beta: >0 altruistic, <0 spiteful
  altruism:
    dist_type: normal
    params:
      loc: 0.1
      scale: 0.3
    bounds: [-1.0, 1.0]

  cost_correlation: 0.0

game:
  environment: both
  x1: 1.0
  x2: 20.0
  num_rounds: 10
  behavioral_prob: 0.5
  matching: random

num_experiments: 1
seed: 42
output_dir: output
